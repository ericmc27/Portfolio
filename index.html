<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric's portfolio</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bungee+Spice&display=swap');
  </style>
</head>

<body>
  <nav>
    <picture>
      <source srcset="profile_picture_avif.avif" type="image/avif">
      <source srcset="profile_picture_webp.webp" type="image/webp">
      <img src="profile_picture.jpg" class="profile_picture" alt="Eric's profile picture" height="110" width="120" />
    </picture>

    <ul>
      <li class="about active" onclick="handleDisplayChange('about')">About me</li>
      <li class="projects" onclick="handleDisplayChange('projects')">Projects</li>
    </ul>
  </nav>

  <div id="about">
    about
  </div>

  <div id="projects">
    projects
  </div>
  <script src="index.js"></script>
</body>

</html>
